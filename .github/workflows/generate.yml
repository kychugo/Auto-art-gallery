name: Generate Artwork

on:
  schedule:
    - cron: '0 20 * * *'   #  4:00 AM HKT
    - cron: '30 20 * * *'  #  4:30 AM HKT
    - cron: '0 21 * * *'   #  5:00 AM HKT
    - cron: '30 21 * * *'  #  5:30 AM HKT
    - cron: '0 22 * * *'   #  6:00 AM HKT
    - cron: '30 22 * * *'  #  6:30 AM HKT
    - cron: '0 23 * * *'   #  7:00 AM HKT
    - cron: '30 23 * * *'  #  7:30 AM HKT
    - cron: '0 0 * * *'    #  8:00 AM HKT
    - cron: '30 0 * * *'   #  8:30 AM HKT
    - cron: '0 1 * * *'    #  9:00 AM HKT
    - cron: '30 1 * * *'   #  9:30 AM HKT
    - cron: '0 2 * * *'    # 10:00 AM HKT
    - cron: '30 2 * * *'   # 10:30 AM HKT
    - cron: '0 3 * * *'    # 11:00 AM HKT
    - cron: '30 3 * * *'   # 11:30 AM HKT
    - cron: '0 4 * * *'    # 12:00 PM HKT
    - cron: '30 4 * * *'   # 12:30 PM HKT
    - cron: '0 5 * * *'    #  1:00 PM HKT
    - cron: '30 5 * * *'   #  1:30 PM HKT
    - cron: '0 6 * * *'    #  2:00 PM HKT
    - cron: '30 6 * * *'   #  2:30 PM HKT
    - cron: '0 7 * * *'    #  3:00 PM HKT
    - cron: '30 7 * * *'   #  3:30 PM HKT
    - cron: '0 8 * * *'    #  4:00 PM HKT
    - cron: '30 8 * * *'   #  4:30 PM HKT
    - cron: '0 9 * * *'    #  5:00 PM HKT
    - cron: '30 9 * * *'   #  5:30 PM HKT
    - cron: '0 10 * * *'   #  6:00 PM HKT
    - cron: '30 10 * * *'  #  6:30 PM HKT
    - cron: '0 11 * * *'   #  7:00 PM HKT
    - cron: '30 11 * * *'  #  7:30 PM HKT
    - cron: '0 12 * * *'   #  8:00 PM HKT
    - cron: '30 12 * * *'  #  8:30 PM HKT
    - cron: '0 13 * * *'   #  9:00 PM HKT
    - cron: '30 13 * * *'  #  9:30 PM HKT
    - cron: '0 14 * * *'   # 10:00 PM HKT
    - cron: '30 14 * * *'  # 10:30 PM HKT
    - cron: '0 15 * * *'   # 11:00 PM HKT
  workflow_dispatch:        # Allow manual trigger

permissions:
  contents: write

# Prevent concurrent runs to avoid git conflicts on gallery.json
concurrency:
  group: generate-artwork
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Generate artwork
        env:
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
        run: python generate_artwork.py

      - name: Commit and push new artwork
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/ gallery.json
          git diff --staged --quiet || git commit -m "feat: add artwork $(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M %Z')"
          # Retry push up to 3 times to handle any transient remote divergence
          pushed=false
          for attempt in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "${GITHUB_REF_NAME}" && { pushed=true; break; } || {
              echo "Push attempt ${attempt} failed, retrying in 10s…"
              sleep 10
            }
          done
          if [ "${pushed}" != "true" ]; then
            echo "ERROR: All push attempts failed."
            exit 1
          fi
